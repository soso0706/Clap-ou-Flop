<div class="add-movie-container">
  <div class="card shadow p-4">

    <h2 class="mb-4 text-center">Ajouter un nouveau film</h2>

    <form #f="ngForm" (ngSubmit)="addMovie()" class="d-flex flex-column gap-3 mb-5">

      <!-- TITRE -->
      <div class="form-group">
        <label for="title">Titre</label>
        <input
          type="text"
          id="title"
          name="title"
          [(ngModel)]="movie.title"
          required
          pattern="^[A-Z ]+$"
          #title="ngModel"
          class="form-control"
          placeholder="Ex: INCEPTION"
        />
        <small class="text-danger" *ngIf="title.invalid && (title.touched || title.dirty)">
          Le titre doit être en MAJUSCULES uniquement
        </small>
      </div>

      <!-- REALISATEUR -->
      <div class="form-group">
        <label for="director">Réalisateur</label>
        <input
          type="text"
          id="director"
          name="director"
          [(ngModel)]="movie.director"
          required
          pattern="^[A-Z][a-z]+ [A-Z][a-z]+$"
          #director="ngModel"
          class="form-control"
          placeholder="Nom Prénom"
        />
        <small class="text-danger" *ngIf="director.invalid && director.touched">
          Format attendu : Nom Prénom
        </small>
      </div>

      <!-- NOTE -->
      <div class="form-group">
        <label for="rate">Note (0 à 5)</label>
        <input
          type="number"
          id="rate"
          name="rate"
          [(ngModel)]="movie.rate"
          required
          min="0"
          max="5"
          step="0.1"
          #rate="ngModel"
          class="form-control"
          placeholder="Ex: 4.5"
        />
        <small class="text-danger" *ngIf="rate.invalid && rate.touched">
          La note doit être un nombre entre 0 et 5
        </small>
      </div>

      <!-- DATE -->
      <div class="form-group">
        <label for="releaseDate">Date de sortie</label>
        <input
          type="date"
          id="releaseDate"
          name="releaseDate"
          [(ngModel)]="movie.releaseDate"
          required
          [max]="today"
          #releaseDate="ngModel"
          class="form-control"
        />
        <small class="text-danger" *ngIf="releaseDate.invalid && releaseDate.touched">
          La date doit être antérieure à aujourd’hui
        </small>
      </div>

      <!-- SYNOPSIS -->
      <div class="form-group">
        <label for="synopsis">Synopsis</label>
        <textarea
          id="synopsis"
          name="synopsis"
          [(ngModel)]="movie.synopsis"
          rows="5"
          minlength="30"
          required
          class="form-control"
          #synopsis="ngModel"
          placeholder="Résumé du film (min 30 caractères)"
        ></textarea>
        <small class="text-danger" *ngIf="synopsis.invalid && synopsis.touched">
          Le synopsis doit contenir au moins 30 caractères
        </small>
      </div>

      <!-- BOUTON AJOUTER -->
      <div class="text-center mt-4">
        <button
          type="submit"
          class="btn btn-warning btn-lg px-5"
          [disabled]="f.invalid">
          Ajouter
        </button>
      </div>

    </form>
  </div>
</div>

<div class="d-flex flex-column w-50">
  <label for="poster">Affiche</label>
  <input
    type="file"
    id="poster"
    accept="image/*"
    class="form-control"
    (change)="onPosterSelected($event)"
  />
</div>
