<div class="d-flex flex-column w-50">
    <label for="title">Titre</label>
    <input type="text" id="title" name="title" [(ngModel)]="movie.title"/>
</div>

<div class="d-flex flex-column w-50">
    <label for="director">Réalisateur</label>
    <input type="text" id="director" name="director" [(ngModel)]="movie.director"/>
</div>

<div class="d-flex flex-column w-50">
    <label for="releaseDate">Date de sortie</label>
    <input type="date" id="releaseDate" name="releaseDate" [(ngModel)]="movie.releaseDate"/>
</div>

<div class="d-flex flex-column w-50">
    <label for="synopsis">Synopsis</label>
    <textarea
        id="synopsis"
        name="synopsis"
        [(ngModel)]="movie.synopsis"
        rows="5"
        class="form-control">
    </textarea>
</div>

<div class="d-flex flex-column w-50">
  <label for="poster">Affiche</label>
  <input
    type="file"
    id="poster"
    accept="image/*"
    class="form-control"
    (change)="onPosterSelected($event)"
  />
</div>

 <button class="btn btn-warning" (click)=addMovie()>Ajouter</button>
