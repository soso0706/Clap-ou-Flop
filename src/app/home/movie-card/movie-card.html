<div 
  class="movie-card" 
  [routerLink]="['/movies', movie.id]"
>

  @if(movie.image) {
    <img 
      [src]="'http://localhost:8080/movies/' + movie.id + '/image'" 
      class="poster"
      alt=""
    />
  }

  <div class="overlay">
    <h5 class="title">{{ movie.title }}</h5>
  </div>

</div>
