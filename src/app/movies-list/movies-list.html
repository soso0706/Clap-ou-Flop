<div class="page">
  <div class="header">
    <div>
      <h1 class="title">Gestion des films</h1>
      <p class="subtitle">Ajoute, modifie et supprime tes films.</p>
    </div>

    <button type="button" class="btn btn-primary" routerLink="/add-movie">
      Nouveau film
    </button>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="text-center">Affiche</th>
            <th>Titre</th>
            <th>Date</th>
            <th>Réalisateur</th>
            <th class="text-center">Note</th>
            <th>Synopsis</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <tbody>
          @for(movie of movies; track movie.id) {
            <tr>
              <td class="text-center">
                <img
                  class="movie-img"
                  [src]="'http://localhost:8080/movies/' + movie.id + '/image'"
                  [alt]="movie.title"
                />
              </td>

              <td>
                <a [routerLink]="['/movies', movie.id]" class="movie-link">
                  {{ movie.title }}
                </a>
              </td>
              <td>{{ movie.releaseDate | date:'dd/MM/yyyy' }}</td>
              <td>{{ movie.director }}</td>

              <td class="text-center">
                <span class="badge rating">{{ movie.rate ?? '—' }} / 5</span>
              </td>

              <td> {{ movie.synopsis }}</td>

              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <button
                    type="button"
                    class="btn btn-light btn-sm icon-btn"
                    (click)="updateMovie(movie.id!)">
                    <i class="bi bi-pencil-fill"></i>
                  </button>

                  <button
                    type="button"
                    class="btn btn-light btn-sm icon-btn danger"
                    (click)="deleteMovie(movie.id!)">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
